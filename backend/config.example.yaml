server:
  port: "8081"
  cors_origin: "http://localhost:5173"

sandbox:
  # Required
  api_key: your-opensandbox-api-key
  server_url: "http://localhost:8080"
  image: "opensandbox/claude-agent-server:latest"
  # Resource limits for sandbox containers. Claude Code needs ~1-2Gi memory and ~1-2 CPU cores.
  # Both default to "4Gi" / "2000m" if omitted.
  memory_limit: "4Gi"
  cpu_limit: "2000m"
  # Optional — both os and arch must be set to take effect
  # platform:
  #   os: linux
  #   arch: amd64

anthropic:
  # Required — injected into sandbox as ANTHROPIC_API_KEY
  api_key: your-anthropic-api-key
  # Optional — leave empty to use api.anthropic.com
  base_url: ""
  # Optional — injected as ANTHROPIC_MODEL; leave empty for server default
  model: ""
  # Optional — set to "1" to disable experimental betas (CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS)
  disable_experimental_betas: ""

# Task store — omit or leave url empty for in-memory store (state lost on restart).
# Set url to enable Redis persistence across restarts and multiple instances.
redis:
  url: ""  # e.g. redis://localhost:6379 or redis://:password@host:port/db

orangefs:
  # Injected into sandbox as ORANGEFS_RS_ADDR (internal host:port)
  addr: ""
  # Injected into sandbox as ORANGEFS_TOKEN
  token: ""
  # Public S3 endpoint URL used by the backend's own S3 client
  endpoint: ""
  volume: ""
  # Credentials for the backend's own S3 client (reading session history)
  access_key: ""
  secret_key: ""

# Optional — omit or leave dsn empty to skip MySQL (auth disabled in dev mode).
mysql:
  dsn: ""  # e.g. user:pass@tcp(localhost:3306)/lucas?parseTime=true&loc=UTC

auth:
  secret_key: ""          # random long string for signing app JWTs
  oidc_state_secret: ""   # separate key for OIDC state JWTs
  token_ttl_seconds: 86400
  state_ttl_seconds: 600
  frontend_url: "http://localhost:5173"

oidc:
  client_id: ""
  client_secret: ""
  discovery_url: ""       # e.g. https://accounts.google.com/.well-known/openid-configuration
  redirect_uri: ""        # e.g. http://localhost:8081/api/auth/oidc/callback
  cli_redirect_uri: ""    # e.g. http://localhost:8081/api/auth/oidc/cli-callback

sso:
  base_url: "https://mis.diditaxi.com.cn"   # SSO base; all API paths are relative to this
  app_id: ""                                 # assigned by UPM when you register the application
  app_key: ""                                # assigned by UPM
  callback_url: ""                           # e.g. http://your-service/api/auth/sso/callback — must match UPM registration
